<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- PathFinder Favicon B: Skill Tree -->
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#07080F"/>

  <!-- Trunk -->
  <line x1="64" y1="106" x2="64" y2="70" stroke="#00C9A7" stroke-width="4" stroke-linecap="round"/>

  <!-- Level 1 branches -->
  <line x1="64" y1="82" x2="36" y2="58" stroke="#00C9A7" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="82" x2="92" y2="58" stroke="#00C9A7" stroke-width="3" stroke-linecap="round"/>

  <!-- Level 2 branches -->
  <line x1="36" y1="58" x2="22" y2="38" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="36" y1="58" x2="50" y2="38" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="92" y1="58" x2="78" y2="38" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="92" y1="58" x2="106" y2="38" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Glow halos on leaf nodes -->
  <circle cx="22" cy="38" r="10" fill="#00C9A7" opacity="0.12"/>
  <circle cx="50" cy="38" r="10" fill="#00C9A7" opacity="0.12"/>
  <circle cx="78" cy="38" r="10" fill="#00C9A7" opacity="0.12"/>
  <circle cx="106" cy="38" r="10" fill="#00C9A7" opacity="0.12"/>

  <!-- Root node -->
  <circle cx="64" cy="106" r="8" fill="#00C9A7"/>

  <!-- Level 1 nodes -->
  <circle cx="64" cy="82" r="6" fill="#00C9A7" opacity="0.9"/>
  <circle cx="36" cy="58" r="6" fill="#00C9A7" opacity="0.9"/>
  <circle cx="92" cy="58" r="6" fill="#00C9A7" opacity="0.9"/>

  <!-- Leaf nodes -->
  <circle cx="22" cy="38" r="5" fill="#00C9A7" opacity="0.75"/>
  <circle cx="50" cy="38" r="5" fill="#00C9A7" opacity="0.75"/>
  <circle cx="78" cy="38" r="5" fill="#00C9A7" opacity="0.75"/>
  <circle cx="106" cy="38" r="5" fill="#00C9A7" opacity="0.75"/>
</svg>
